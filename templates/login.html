{% extends 'base.html' %}
{% block title %}Logowanie — GamePlan{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-mark">GP</span> GamePlan</div>
    <p class="auth-subtitle">Zaloguj się do panelu drużyny CS2</p>
    <form method="POST" class="form">
      <label>Nazwa użytkownika lub e-mail</label>
      <input type="text" name="identifier" required autofocus>
      <label>Hasło</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn btn-primary btn-block">Zaloguj się</button>
    </form>
    <p class="auth-switch">Nie masz konta? <a href="{{ url_for('auth.register') }}">Zarejestruj się</a></p>
  </div>
</div>
{% endblock %}
